<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="calculator" aria-label="Calculadora básica">
      <div class="calculator__header">
        <p class="calculator__eyebrow">Mini proyecto</p>
        <h1>Calculadora</h1>
        <p class="calculator__subtitle">Diseño limpio, responsive y lista para futuras prácticas.</p>
      </div>

      <div class="display">
        <p class="display__history" id="history"></p>
        <p class="display__current" id="display">0</p>
      </div>

      <div class="keys">
        <button class="key key--muted" data-action="clear">AC</button>
        <button class="key key--muted" data-action="delete">DEL</button>
        <button class="key key--muted" data-action="percent">%</button>
        <button class="key key--accent" data-action="operator" data-value="/">÷</button>

        <button class="key" data-action="number" data-value="7">7</button>
        <button class="key" data-action="number" data-value="8">8</button>
        <button class="key" data-action="number" data-value="9">9</button>
        <button class="key key--accent" data-action="operator" data-value="*">×</button>

        <button class="key" data-action="number" data-value="4">4</button>
        <button class="key" data-action="number" data-value="5">5</button>
        <button class="key" data-action="number" data-value="6">6</button>
        <button class="key key--accent" data-action="operator" data-value="-">−</button>

        <button class="key" data-action="number" data-value="1">1</button>
        <button class="key" data-action="number" data-value="2">2</button>
        <button class="key" data-action="number" data-value="3">3</button>
        <button class="key key--accent" data-action="operator" data-value="+">+</button>

        <button class="key key--wide" data-action="number" data-value="0">0</button>
        <button class="key" data-action="decimal">.</button>
        <button class="key key--accent" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
